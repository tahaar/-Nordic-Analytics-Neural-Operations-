name: App Containers

on:
  push:
    branches:
      - production
    paths:
      - 'packages/frontend/**'
      - 'packages/backend/**'
      - 'Dockerfile.frontend'
      - 'Dockerfile.backend'
      - '.github/workflows/app-containers.yml'

concurrency:
  group: app-containers-${{ github.ref }}
  cancel-in-progress: true

permissions:
  id-token: write
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Login to ACR
      uses: docker/login-action@v2
      with:
        registry: ${{ secrets.ACR_LOGIN_SERVER }}
        username: ${{ secrets.ACR_USERNAME }}
        password: ${{ secrets.ACR_PASSWORD }}

    - name: Build and push backend image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile.backend
        push: true
        tags: ${{ secrets.ACR_LOGIN_SERVER }}/betting-backend:latest

    - name: Build and push frontend image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile.frontend
        push: true
        tags: ${{ secrets.ACR_LOGIN_SERVER }}/betting-frontend:latest

    - name: Azure Login
      uses: azure/login@v2
      with:
        client-id: ${{ secrets.AZURE_CLIENT_ID }}
        tenant-id: ${{ secrets.AZURE_TENANT_ID }}
        subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

    - name: Update backend Container App
      uses: azure/cli@v1
      with:
        inlineScript: |
          az containerapp update --name backend --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} --image ${{ secrets.ACR_LOGIN_SERVER }}/betting-backend:latest

    - name: Update frontend Container App
      uses: azure/cli@v1
      with:
        inlineScript: |
          az containerapp update --name frontend --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} --image ${{ secrets.ACR_LOGIN_SERVER }}/betting-frontend:latest